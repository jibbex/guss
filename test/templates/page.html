<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">{{ site.title }}</a>
        </nav>
    </header>

    <main>
        <article>
            <h1>{{ page.title }}</h1>
            <div class="content">
                {{ page.content | safe }}
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; {{ site.title }}</p>
    </footer>
</body>
</html>
