<!DOCTYPE html>
<html lang="{{ site.language }}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% block head %}
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site.description }}{% endblock %}">
  {% endblock %}
  <link rel="icon" href="{{ site.url }}/assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="{{ site.url }}/assets/apple-touch-icon.png">
  <!-- Site styles -->
  <link rel="stylesheet" href="{{ site.url }}/assets/style.css">

  <!-- Theme init: runs before first paint to prevent flash -->
  <script>
    (function () {
      const stored = localStorage.getItem('forge-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body class="bg-page text-body font-[Inter,sans-serif] antialiased">

  <!-- Navigation -->
  <nav x-data="themeToggle"
       class="sticky top-0 z-50 flex items-center justify-between px-8 h-16 bg-nav border-b border-subtle backdrop-blur-md">

    <!-- Logo -->
    <a href="{{ site.url }}/" class="gradient-text font-black text-xl tracking-tight no-underline">guss</a>

    <!-- Nav links -->
    <div class="hidden md:flex items-center gap-8 text-muted text-lg">
      <a href="{{ site.url }}/docs/getting-started/" class="hover:text-primary transition-colors">Docs</a>
      <a href="{{ site.url }}/internals/pipeline/" class="hover:text-primary  transition-colors">Internals</a>
      <a href="{{ site.url }}/how-guss-works/" class="hover:text-primary  transition-colors">How it works</a>
      <a href="https://github.com/your-org/guss" class="hover:text-primary  transition-colors" target="_blank" rel="noopener">
        <svg class="inline-block" width="48" height="48" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M56.7937 84.9688C44.4187 83.4688 35.7 74.5625 35.7 63.0313C35.7 58.3438 37.3875 53.2813 40.2 49.9063C38.9812 46.8125 39.1687 40.25 40.575 37.5313C44.325 37.0625 49.3875 39.0313 52.3875 41.75C55.95 40.625 59.7 40.0625 64.2937 40.0625C68.8875 40.0625 72.6375 40.625 76.0125 41.6563C78.9187 39.0313 84.075 37.0625 87.825 37.5313C89.1375 40.0625 89.325 46.625 88.1062 49.8125C91.1062 53.375 92.7 58.1563 92.7 63.0313C92.7 74.5625 83.9812 83.2813 71.4187 84.875C74.6062 86.9375 76.7625 91.4375 76.7625 96.5938L76.7625 106.344C76.7625 109.156 79.1062 110.75 81.9187 109.625C98.8875 103.156 112.2 86.1875 112.2 65.1875C112.2 38.6563 90.6375 17 64.1062 17C37.575 17 16.2 38.6562 16.2 65.1875C16.2 86 29.4187 103.25 47.2312 109.719C49.7625 110.656 52.2 108.969 52.2 106.438L52.2 98.9375C50.8875 99.5 49.2 99.875 47.7 99.875C41.5125 99.875 37.8562 96.5 35.2312 90.2188C34.2 87.6875 33.075 86.1875 30.9187 85.9063C29.7937 85.8125 29.4187 85.3438 29.4187 84.7813C29.4187 83.6563 31.2937 82.8125 33.1687 82.8125C35.8875 82.8125 38.2312 84.5 40.6687 87.9688C42.5437 90.6875 44.5125 91.9063 46.8562 91.9063C49.2 91.9063 50.7 91.0625 52.8562 88.9063C54.45 87.3125 55.6687 85.9063 56.7937 84.9688Z" fill="black"/>
        </svg>
        GitHub
      </a>
    </div>

    <!-- Right side: theme toggle + CTA -->
    <div class="flex items-center gap-4">
      <!-- Theme toggle -->
      <button @click="toggle($event)"
              class="w-10 h-10 flex items-center justify-center rounded-md border border-subtle text-muted hover:text-body hover:bg-surface transition-colors"
              :title="dark ? 'Switch to light mode' : 'Switch to dark mode'"
              aria-label="Toggle theme">
        <svg x-show="!dark" aria-hidden="true" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg x-show="dark" aria-hidden="true" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>

      <!-- Get Started CTA -->
      <a href="{{ site.url }}/docs/getting-started/"
         class="hidden sm:inline-flex gradient-bg text-white px-5 py-2 rounded-md font-semibold active:ring-2 active:ring-offset-2 active:ring-violet-400 no-underline transition-all">
        Get Started
      </a>
    </div>
  </nav>

  <!-- Page content — overridden by child templates -->
  {% block content %}{% endblock %}

  <!-- Footer -->
  <footer class="bg-footer border-footer border-subtle mt-16 py-10 px-8 text-muted text-lg">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-5">
      <span class="gradient-text font-black text-xl tracking-tight">guss</span>
      <span>A pluggable static site generator written in C++23</span>
      <div class="flex items-center gap-6">
        <a href="{{ site.url }}/docs/getting-started/" class="hover:text-body transition-colors">Docs</a>
        <a href="{{ site.url }}/internals/pipeline/" class="hover:text-body transition-colors">Internals</a>
        <a href="https://github.com/your-org/guss" class="hover:text-body transition-colors" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>
  
  <!-- Site JS (includes Alpine.js) -->
  <script defer src="{{ site.url }}/assets/main.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
